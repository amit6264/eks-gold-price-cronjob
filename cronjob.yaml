apiVersion: batch/v1
kind: CronJob
metadata:
  name: gold-price-cronjob
spec:
  schedule: "*/5 * * * *"   # runs every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: gold-price-container
            image: <AWS_ACCOUNT_ID>.dkr.ecr.eu-north-1.amazonaws.com/gold-price-cronjob:latest
            env:
              - name: AWS_REGION
                value: "ap-south-1"
              - name: SNS_TOPIC_ARN
                valueFrom:
                  secretKeyRef:
                    name: sns-topic-secret
                    key: topic_arn
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: aws-credentials
                    key: AWS_ACCESS_KEY_ID
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: aws-credentials
                    key: AWS_SECRET_ACCESS_KEY
          restartPolicy: Never
