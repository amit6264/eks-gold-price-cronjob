apiVersion: batch/v1
kind: CronJob
metadata:
  name: gold-price-cronjob
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: gold-price-container
            image: 066380524960.dkr.ecr.eu-north-1.amazonaws.com/gold-price-cronjob:latest
            env:
            - name: GOLD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: goldapi-secret
                  key: GOLD_API_KEY

            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY

            - name: SNS_TOPIC_ARN
              valueFrom:
                secretKeyRef:
                  name: sns-topic-secret
                  key: topic_arn

            - name: AWS_REGION
              value: "eu-north-1"

          restartPolicy: Never
